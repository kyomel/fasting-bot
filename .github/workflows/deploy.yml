name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gcc libc6-dev libsqlite3-dev
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -buildvcs=false -o fasting-bot ./cmd/fasting-bot

      - name: Copy files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "fasting-bot,deploy/fasting-bot.service"
          target: "/tmp/deploy/"

      - name: Deploy and restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            sudo mv /tmp/deploy/fasting-bot /opt/fasting-bot/fasting-bot
            sudo mv /tmp/deploy/deploy/fasting-bot.service /etc/systemd/system/fasting-bot.service
            sudo chown -R fastingbot:fastingbot /opt/fasting-bot
            sudo chmod +x /opt/fasting-bot/fasting-bot
            sudo systemctl daemon-reload
            sudo systemctl enable --now fasting-bot
            sleep 3
            sudo systemctl status fasting-bot --no-pager
